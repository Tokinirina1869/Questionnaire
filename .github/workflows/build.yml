name: Full CI/CD Pipeline (Sonar + Docker + Deploy)

on:
  push:
    branches:
      - main
      - master

jobs:
  build-analyze:
    name: Build & Sonar Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + Test + SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B clean verify sonar:sonar

  docker-build:
    name: Build Docker Image
    needs: build-analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myapp-wildfly:latest .

      - name: Save image
        run: docker save myapp-wildfly:latest > image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  deploy:
    name: Deploy to Server
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Copy image to server
        run: scp image.tar root@YOUR_SERVER:/tmp/

      - name: Deploy on server
        run: |
          ssh root@YOUR_SERVER "
          docker load < /tmp/image.tar &&
          docker stop wildfly || true &&
          docker rm wildfly || true &&
          docker run -d --name wildfly -p 8080:8080 myapp-wildfly:latest
          "